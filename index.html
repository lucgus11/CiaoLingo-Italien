<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CiaoLingo - Apprendre l'Italien</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .progress-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-gradient-to-br from-green-100 via-white to-red-100 min-h-screen pb-20">

    <nav class="p-4 glass sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <h1 class="text-2xl font-bold text-green-700">🇮🇹 CiaoLingo</h1>
        <div class="flex gap-4 items-center">
            <span id="streak" class="font-bold text-orange-500"><i class="fas fa-fire"></i> 0</span>
            <span id="points" class="font-bold text-blue-500"><i class="fas fa-star"></i> 0</span>
        </div>
    </nav>

    <main id="app" class="container mx-auto p-4 max-w-md">
        
        <section id="dashboard" class="space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border-b-4 border-gray-200">
                <h2 class="text-xl font-bold mb-2">Ta progression</h2>
                <div class="w-full bg-gray-200 rounded-full h-4">
                    <div id="main-progress" class="bg-green-500 h-4 rounded-full progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div id="levels-container" class="grid grid-cols-1 gap-4">
                </div>
        </section>

        <section id="quiz-container" class="hidden fixed inset-0 bg-white z-[60] p-6 flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <button onclick="exitQuiz()" class="text-2xl text-gray-400">&times;</button>
                <div class="w-2/3 bg-gray-200 rounded-full h-2">
                    <div id="quiz-progress" class="bg-green-500 h-2 rounded-full progress-bar" style="width: 0%"></div>
                </div>
                <span></span>
            </div>
            
            <div id="question-area" class="flex-grow flex flex-col items-center justify-center text-center">
                </div>

            <div id="feedback" class="hidden p-4 rounded-2xl mb-4 text-center font-bold"></div>
            <button id="next-btn" class="w-full bg-green-600 text-white py-4 rounded-2xl text-xl font-bold shadow-lg transform active:scale-95 transition">VÉRIFIER</button>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 shadow-lg">
        <button onclick="showSection('dashboard')" class="text-green-600 flex flex-col items-center"><i class="fas fa-home"></i><span class="text-xs">Apprendre</span></button>
        <button onclick="startFlashcards()" class="text-gray-400 flex flex-col items-center"><i class="fas fa-clone"></i><span class="text-xs">Révision</span></button>
        <button onclick="showProfile()" class="text-gray-400 flex flex-col items-center"><i class="fas fa-user"></i><span class="text-xs">Profil</span></button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
